<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg0:#0b0e1a;--bg1:#0e1225;--bg2:rgba(18,22,42,.92);--bg3:rgba(30,35,60,.85);--bg4:rgba(50,55,85,.7);
  --glass:rgba(16,20,38,.78);--glass-border:rgba(255,255,255,.08);
  --tx1:#fff;--tx2:rgba(235,235,245,.6);--tx3:rgba(235,235,245,.35);
  --accent:#bf5af2;--accent-d:rgba(191,90,242,.15);
  --green:#30d158;--red:#ff453a;--pink:#ff375f;
  --sent-bg:rgba(120,80,220,.28);--sent-border:rgba(180,140,255,.2);
  --recv-bg:rgba(255,255,255,.08);--recv-border:rgba(255,255,255,.1);
  --rb:20px;--sidebar-w:272px;
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
  --tr:250ms cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:#080a14;font-family:'Noto Sans SC',-apple-system,'PingFang SC',sans-serif;color:var(--tx1);display:flex;justify-content:center;align-items:center;-webkit-font-smoothing:antialiased;}
#app{width:100%;max-width:500px;height:100vh;height:100dvh;display:flex;position:relative;overflow:hidden;}
@media(min-width:540px){#app{height:min(932px,100vh);border-radius:32px;box-shadow:0 0 0 2px rgba(128,128,128,.15),0 30px 80px rgba(0,0,0,.5);}}
#skyCanvas{position:absolute;inset:0;z-index:0;width:100%;height:100%;image-rendering:pixelated;}

/* Sidebar */
.sidebar{position:absolute;top:0;bottom:0;left:0;width:var(–sidebar-w);background:rgba(14,18,37,.96);-webkit-backdrop-filter:saturate(140%) blur(28px);backdrop-filter:saturate(140%) blur(28px);z-index:80;transform:translateX(-100%);transition:transform 320ms cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,.06);}
.sidebar.open{transform:translateX(0);}
.sb-hdr{padding:14px;padding-top:max(14px,var(–safe-t));display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.06);}
.sb-title{font-size:17px;font-weight:700;}
.sb-list{flex:1;overflow-y:auto;padding:6px;-webkit-overflow-scrolling:touch;}
.sb-list::-webkit-scrollbar{display:none;}
.ch-item{padding:11px;border-radius:11px;cursor:pointer;margin-bottom:3px;transition:background var(–tr);display:flex;align-items:center;gap:10px;position:relative;}
.ch-item:active{background:rgba(255,255,255,.04);}
.ch-item.active{background:var(–accent-d);}
.ch-dot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;background:rgba(255,255,255,.06);}
.ch-info{flex:1;min-width:0;}
.ch-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ch-preview{font-size:11px;color:var(–tx3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.ch-del{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:26px;height:26px;border-radius:50%;background:transparent;border:none;color:var(–tx3);font-size:13px;cursor:pointer;display:none;align-items:center;justify-content:center;}
.ch-item:hover .ch-del,.ch-item:active .ch-del{display:flex;}
.sb-add{margin:6px;padding:11px;border-radius:11px;background:rgba(255,255,255,.05);border:1px dashed rgba(255,255,255,.1);color:var(–tx2);font-size:13px;font-family:inherit;cursor:pointer;text-align:center;}
.sb-bk{position:absolute;inset:0;z-index:79;background:rgba(0,0,0,.3);opacity:0;pointer-events:none;transition:opacity 300ms;}
.sb-bk.v{opacity:1;pointer-events:auto;}

/* Main */
.main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative;z-index:1;}
.hdr{flex-shrink:0;padding:9px 14px;padding-top:max(9px,var(–safe-t));background:rgba(0,0,0,.15);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);z-index:10;display:flex;align-items:center;gap:10px;}
.hbtn{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.06);border:none;color:rgba(255,255,255,.45);font-size:13px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all var(–tr);}
.hbtn:active{background:rgba(255,255,255,.12);}
.hinfo{flex:1;min-width:0;text-align:center;}
.hname{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 1px 8px rgba(0,0,0,.4);}
.hstatus{font-size:11px;margin-top:1px;text-shadow:0 1px 4px rgba(0,0,0,.3);}

/* Messages */
.msgs{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px;display:flex;flex-direction:column;gap:4px;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;z-index:1;}
.msgs::-webkit-scrollbar{display:none;}
.bgroup{display:flex;flex-direction:column;gap:3px;max-width:84%;animation:bIn 260ms ease both;}
.bgroup.sent{align-self:flex-end;align-items:flex-end;}
.bgroup.recv{align-self:flex-start;align-items:flex-start;}
@keyframes bIn{from{opacity:0;transform:translateY(8px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
.bbl{padding:10px 15px;font-size:15px;line-height:1.55;word-break:break-word;white-space:pre-wrap;cursor:pointer;-webkit-user-select:text;user-select:text;-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);transition:filter .15s;}
.bbl:active{filter:brightness(.85);}
.bgroup.sent .bbl{background:var(–sent-bg);border:1px solid var(–sent-border);color:#fff;border-radius:var(–rb);}
.bgroup.sent .bbl:only-child{border-radius:var(–rb) var(–rb) 6px var(–rb);}
.bgroup.sent .bbl:first-child:not(:only-child){border-radius:var(–rb) var(–rb) 6px var(–rb);}
.bgroup.sent .bbl:last-child:not(:only-child){border-radius:var(–rb) 6px 6px var(–rb);}
.bgroup.sent .bbl:not(:first-child):not(:last-child){border-radius:var(–rb) 6px 6px var(–rb);}
.bgroup.recv .bbl{background:var(–recv-bg);border:1px solid var(–recv-border);color:var(–tx1);border-radius:var(–rb);}
.bgroup.recv .bbl:only-child{border-radius:var(–rb) var(–rb) var(–rb) 6px;}
.bgroup.recv .bbl:first-child:not(:only-child){border-radius:var(–rb) var(–rb) var(–rb) 6px;}
.bgroup.recv .bbl:last-child:not(:only-child){border-radius:6px var(–rb) var(–rb) 6px;}
.bgroup.recv .bbl:not(:first-child):not(:last-child){border-radius:6px var(–rb) var(–rb) 6px;}
.mtime{font-size:10px;color:rgba(255,255,255,.35);margin-top:2px;padding:0 4px;}
.bbl.err{background:rgba(255,69,58,.12)!important;color:var(–red)!important;border-color:rgba(255,69,58,.15)!important;font-size:13px;}

/* Thinking */
.think-wrap{max-width:84%;align-self:flex-start;margin-bottom:2px;animation:bIn 240ms ease both;}
.think-toggle{font-size:12px;color:rgba(255,255,255,.35);cursor:pointer;padding:4px 8px;display:flex;align-items:center;gap:4px;border-radius:8px;}
.think-toggle:hover{background:rgba(255,255,255,.05);}
.think-toggle .arrow{transition:transform .2s;display:inline-block;}
.think-toggle .arrow.open{transform:rotate(90deg);}
.think-body{max-height:0;overflow:hidden;transition:max-height .35s ease;padding:0 8px;}
.think-body.open{max-height:3000px;}
.think-text{font-size:13px;color:rgba(255,255,255,.3);line-height:1.55;white-space:pre-wrap;padding:6px 0;border-left:2px solid rgba(255,255,255,.1);padding-left:10px;}

.typing{display:none;align-self:flex-start;padding:11px 16px;background:var(–recv-bg);border:1px solid var(–recv-border);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border-radius:var(–rb) var(–rb) var(–rb) 6px;}
.typing.v{display:flex;gap:5px;align-items:center;}
.tdot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.3);animation:tb 1.4s infinite ease-in-out;}
.tdot:nth-child(2){animation-delay:.2s;}.tdot:nth-child(3){animation-delay:.4s;}
@keyframes tb{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-5px);opacity:1;}}
.welc{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 24px;text-align:center;margin:auto 0;}
.welc-e{font-size:44px;margin-bottom:12px;}.welc-t{font-size:19px;font-weight:700;margin-bottom:6px;background:linear-gradient(135deg,var(–accent),var(–pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}.welc-d{font-size:13px;color:var(–tx2);line-height:1.7;max-width:250px;}

/* Context menu */
.ctx-menu{position:fixed;z-index:200;background:rgba(25,30,55,.92);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:4px;box-shadow:0 10px 40px rgba(0,0,0,.4);opacity:0;pointer-events:none;transform:scale(.9);transition:all .15s ease;min-width:130px;}
.ctx-menu.v{opacity:1;pointer-events:auto;transform:scale(1);}
.ctx-item{padding:10px 14px;font-size:14px;cursor:pointer;border-radius:10px;display:flex;align-items:center;gap:8px;color:var(–tx1);transition:background .12s;}
.ctx-item:active{background:rgba(255,255,255,.08);}
.ctx-item.danger{color:var(–red);}

/* Input */
.ibar{flex-shrink:0;padding:7px 10px;padding-bottom:max(7px,var(–safe-b));background:rgba(0,0,0,.18);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);display:flex;align-items:flex-end;gap:7px;z-index:2;}
.ifield{flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:9px 15px;color:var(–tx1);font-size:15px;font-family:inherit;line-height:1.4;resize:none;outline:none;max-height:120px;min-height:40px;overflow-y:auto;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);transition:border-color var(–tr);}
.ifield:focus{border-color:rgba(191,90,242,.35);}
.ifield::placeholder{color:var(–tx3);}
.sbtn{width:40px;height:40px;border-radius:50%;background:rgba(191,90,242,.45);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);border:1px solid rgba(191,90,242,.25);color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all var(–tr);opacity:.3;transform:scale(.86);}
.sbtn.active{opacity:1;transform:scale(1);background:rgba(191,90,242,.6);}
.sbtn:active{transform:scale(.84);}

/* Settings */
.sov{position:absolute;inset:0;background:rgba(0,0,0,.4);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 280ms;}
.sov.open{opacity:1;pointer-events:auto;}
.ssheet{width:100%;max-width:500px;background:rgba(18,22,42,.97);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border-radius:18px 18px 0 0;padding:13px 16px;padding-bottom:max(13px,calc(var(–safe-b) + 8px));transform:translateY(100%);transition:transform 340ms cubic-bezier(.32,.72,0,1);max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;border-top:1px solid rgba(255,255,255,.06);}
.ssheet::-webkit-scrollbar{display:none;}
.sov.open .ssheet{transform:translateY(0);}
.shandle{width:34px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:0 auto 12px;}
.stitle{font-size:16px;font-weight:600;margin-bottom:12px;text-align:center;}
.sg{margin-bottom:10px;}.sl{font-size:12px;color:var(–tx2);margin-bottom:3px;display:block;}
.si{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:9px 12px;color:var(–tx1);font-size:13px;font-family:‘SF Mono’,‘Menlo’,‘Courier New’,monospace;outline:none;transition:border-color var(–tr);}
.si:focus{border-color:var(–accent);}.si::placeholder{color:var(–tx3);}
.sta{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:9px 12px;color:var(–tx1);font-size:13px;font-family:inherit;line-height:1.5;outline:none;resize:vertical;min-height:60px;max-height:170px;transition:border-color var(–tr);}
.sta:focus{border-color:var(–accent);}.sta::placeholder{color:var(–tx3);}
.snote{font-size:10px;color:var(–tx3);margin-top:2px;line-height:1.4;}
.ssave{width:100%;padding:12px;border-radius:12px;border:none;background:var(–accent);color:#fff;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:12px;}.ssave:active{opacity:.7;}
.srow{display:flex;gap:6px;margin-top:7px;}
.srow button{flex:1;padding:10px;border-radius:10px;font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;}
.bo-d{background:transparent;border:1px solid rgba(255,69,58,.2);color:var(–red);}
.bo-s{background:transparent;border:1px solid rgba(255,255,255,.1);color:var(–tx2);}
.range-wrap{display:flex;align-items:center;gap:10px;}
.range-wrap input[type=range]{flex:1;-webkit-appearance:none;height:4px;background:rgba(255,255,255,.12);border-radius:2px;outline:none;}
.range-wrap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.3);cursor:pointer;}
.range-val{font-size:14px;font-weight:600;min-width:28px;text-align:center;}
.toast{position:absolute;top:56px;left:50%;z-index:200;transform:translateX(-50%) translateY(-12px);background:rgba(40,45,70,.9);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);padding:8px 16px;border-radius:10px;font-size:13px;opacity:0;pointer-events:none;transition:all 280ms;white-space:nowrap;border:1px solid rgba(255,255,255,.06);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.edit-bar{display:none;flex-shrink:0;padding:7px 10px;padding-bottom:max(7px,var(–safe-b));background:rgba(0,0,0,.18);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);align-items:flex-end;gap:7px;z-index:2;}
.edit-bar.v{display:flex;}
.cancel-btn{padding:9px 14px;border-radius:20px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.06);color:var(–tx2);font-size:14px;font-family:inherit;cursor:pointer;flex-shrink:0;}
</style>

</head>
<body>
<div id="app">
  <canvas id="skyCanvas"></canvas>
  <div class="sb-bk" id="sbBk"></div>
  <div class="sidebar" id="sidebar">
    <div class="sb-hdr"><div class="sb-title">💬 频道</div><button class="hbtn" id="closeSb" style="font-size:13px;">✕</button></div>
    <div class="sb-list" id="chList"></div>
    <button class="sb-add" id="addCh">+ 新建频道</button>
  </div>
  <div class="main">
    <div class="hdr">
      <button class="hbtn" id="openSb">☰</button>
      <div class="hinfo"><div class="hname" id="hName">Chat</div><div class="hstatus" id="hStatus"></div></div>
      <button class="hbtn" id="cfgBtn">⚙</button>
    </div>
    <div class="msgs" id="msgs">
      <div class="welc" id="welc"><div class="welc-e">💬</div><div class="welc-t">AI Chat</div><div class="welc-d">☰ 管理频道 · ⚙ 频道设置<br>每个频道独立配置与记录</div></div>
      <div class="typing" id="typing"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div>
    </div>
    <div class="ibar" id="ibar">
      <textarea class="ifield" id="ifield" rows="1" placeholder="说点什么…"></textarea>
      <button class="sbtn" id="sbtn">↑</button>
    </div>
    <div class="edit-bar" id="editBar">
      <textarea class="ifield" id="editField" rows="1" placeholder="编辑消息…"></textarea>
      <button class="cancel-btn" id="editCancel">取消</button>
      <button class="sbtn active" id="editSend">↑</button>
    </div>
  </div>
  <div class="sov" id="sov">
    <div class="ssheet">
      <div class="shandle"></div>
      <div class="stitle" id="sLabel">⚙ 频道设置</div>
      <div class="sg"><label class="sl">频道名称</label><input class="si" id="cName" style="font-family:inherit" placeholder="名字"></div>
      <div class="sg"><label class="sl">图标 (emoji)</label><input class="si" id="cEmoji" style="font-family:inherit;font-size:17px" placeholder="💬" maxlength="4"></div>
      <div class="sg"><label class="sl">API 地址</label><input class="si" id="cUrl" placeholder="https://openrouter.ai/api/v1/chat/completions"><div class="snote">OpenAI兼容 · /v1/chat/completions</div></div>
      <div class="sg"><label class="sl">API Key</label><input class="si" id="cKey" type="password" placeholder="sk-or-xxxxx"><div class="snote">仅存浏览器本地</div></div>
      <div class="sg"><label class="sl">模型</label><input class="si" id="cModel" placeholder="anthropic/claude-sonnet-4"></div>
      <div class="sg"><label class="sl">系统指令</label><textarea class="sta" id="cSys" rows="3" placeholder="角色、性格、规则…留空不发送"></textarea></div>
      <div class="sg"><label class="sl">上下文条数</label><div class="range-wrap"><input type="range" id="cCtx" min="2" max="80" value="40"><span class="range-val" id="cCtxVal">40</span></div></div>
      <button class="ssave" id="sSave">保存</button>
      <div class="srow"><button class="bo-s" id="expBtn">📋 导出</button><button class="bo-d" id="clrBtn">🗑 清空</button></div>
    </div>
  </div>
  <div class="ctx-menu" id="ctxMenu">
    <div class="ctx-item" data-action="copy">📋 复制</div>
    <div class="ctx-item" data-action="edit">✏️ 编辑</div>
    <div class="ctx-item" data-action="regen">🔄 重新生成</div>
    <div class="ctx-item danger" data-action="delete">🗑 删除</div>
  </div>
  <div class="toast" id="toast"></div>
</div>

<script>
/* ═══════════════════════════════════════
   PIXEL ART SKY RENDERER
   ═══════════════════════════════════════ */
const skyCanvas=document.getElementById('skyCanvas');
const sky=skyCanvas.getContext('2d');
const PX=4; // pixel block size
let cW,cH,gW,gH; // canvas & grid dimensions
let pixelStars=[];

function initSky(){
  cW=skyCanvas.offsetWidth;cH=skyCanvas.offsetHeight;
  skyCanvas.width=cW;skyCanvas.height=cH;
  sky.imageSmoothingEnabled=false;
  gW=Math.ceil(cW/PX);gH=Math.ceil(cH/PX);
  // Generate pixel star positions on grid
  pixelStars=[];
  for(let i=0;i<60;i++){
    pixelStars.push({
      gx:Math.floor(Math.random()*gW),
      gy:Math.floor(Math.random()*(gH*.55)),
      size:Math.random()>.85?2:1, // 1 or 2 pixel blocks
      twinkleSpeed:Math.random()*.005+.002,
      twinkleOffset:Math.random()*1000,
      brightness:Math.random()*.5+.5,
    });
  }
}

function getPhase(){
  const h=new Date().getHours();
  if(h>=4&&h<9)return'dawn';
  if(h>=9&&h<16)return'day';
  if(h>=16&&h<21)return'sunset';
  return'night';
}

// Interpolate two hex colors
function lerpColor(a,b,t){
  const ar=parseInt(a.slice(1,3),16),ag=parseInt(a.slice(3,5),16),ab=parseInt(a.slice(5,7),16);
  const br=parseInt(b.slice(1,3),16),bg=parseInt(b.slice(3,5),16),bb=parseInt(b.slice(5,7),16);
  const r=Math.round(ar+(br-ar)*t),g=Math.round(ag+(bg-ag)*t),bl=Math.round(ab+(bb-ab)*t);
  return`rgb(${r},${g},${bl})`;
}

// Draw a single pixel block
function px(gx,gy,color,alpha=1){
  if(alpha<1)sky.globalAlpha=alpha;
  sky.fillStyle=color;
  sky.fillRect(gx*PX,gy*PX,PX,PX);
  if(alpha<1)sky.globalAlpha=1;
}

// Draw filled pixel rect (multiple blocks)
function pxRect(gx,gy,w,h,color,alpha=1){
  if(alpha<1)sky.globalAlpha=alpha;
  sky.fillStyle=color;
  sky.fillRect(gx*PX,gy*PX,w*PX,h*PX);
  if(alpha<1)sky.globalAlpha=1;
}

function drawPixelSky(){
  const phase=getPhase();
  const now=Date.now();

  // ── GRADIENT BACKGROUND (drawn per-row as pixel strips) ──
  const palettes={
    dawn:[
      {pos:0,col:'#1a1a3e'},{pos:.25,col:'#2d3a6e'},{pos:.5,col:'#6e7eaa'},
      {pos:.75,col:'#c4a0a0'},{pos:1,col:'#e8cbb0'}
    ],
    day:[
      {pos:0,col:'#3a7bd5'},{pos:.3,col:'#6ab0e8'},{pos:.6,col:'#92cdf0'},
      {pos:1,col:'#c8e6f5'}
    ],
    sunset:[
      {pos:0,col:'#1a0a2e'},{pos:.18,col:'#3b1578'},{pos:.35,col:'#7b2fa0'},
      {pos:.52,col:'#c75a8c'},{pos:.7,col:'#e88a5e'},{pos:.85,col:'#f0a848'},
      {pos:1,col:'#f7c948'}
    ],
    night:[
      {pos:0,col:'#060610'},{pos:.2,col:'#0c0e22'},{pos:.5,col:'#141838'},
      {pos:.8,col:'#1c2248'},{pos:1,col:'#222850'}
    ]
  };
  const pal=palettes[phase];
  for(let gy=0;gy<gH;gy++){
    const t=gy/gH;
    // Find the two palette stops
    let c=pal[0].col;
    for(let i=0;i<pal.length-1;i++){
      if(t>=pal[i].pos&&t<=pal[i+1].pos){
        const lt=(t-pal[i].pos)/(pal[i+1].pos-pal[i].pos);
        c=lerpColor(pal[i].col,pal[i+1].col,lt);break;
      }
    }
    if(t>pal[pal.length-1].pos)c=pal[pal.length-1].col;
    sky.fillStyle=c;
    sky.fillRect(0,gy*PX,cW,PX);
  }

  // ── PIXEL STARS ──
  if(phase!=='day'){
    const starAlpha=phase==='night'?1:phase==='dawn'?.45:.55;
    pixelStars.forEach(s=>{
      const twinkle=Math.sin(now*s.twinkleSpeed+s.twinkleOffset)*.35+.65;
      const a=s.brightness*twinkle*starAlpha;
      const colors=['#ffffff','#ddddff','#ffeedd','#ccccff'];
      const col=colors[Math.floor(s.twinkleOffset)%colors.length];
      if(s.size===2){
        px(s.gx,s.gy,col,a);px(s.gx+1,s.gy,col,a*.6);
        px(s.gx,s.gy+1,col,a*.6);
      }else{
        px(s.gx,s.gy,col,a);
      }
    });
    // A few bright cross-shaped stars
    if(phase==='night'){
      [[gW*.2,gH*.08],[gW*.65,gH*.15],[gW*.85,gH*.05]].forEach(([x,y])=>{
        const a=Math.sin(now*.003+x)*.3+.7;
        const gx=Math.floor(x),gy=Math.floor(y);
        px(gx,gy,'#ffffff',a);
        px(gx-1,gy,'#ccccff',a*.4);px(gx+1,gy,'#ccccff',a*.4);
        px(gx,gy-1,'#ccccff',a*.4);px(gx,gy+1,'#ccccff',a*.4);
      });
    }
  }

  // ── PIXEL MOON ──
  if(phase==='night'||phase==='dawn'){
    const mx=Math.floor(gW*.75),my=Math.floor(gH*.08);
    const moonAlpha=phase==='night'?1:.5;
    const mc='#f0eed8';const bg=phase==='night'?'#0c0e22':'#2d3a6e';
    // Crescent moon from pixel blocks ~8x8
    const moonMap=[
      '..xxx...',
      '.xxxxx..',
      'xxxxxx..',
      'xxxxxxx.',
      'xxxxxxx.',
      'xxxxxx..',
      '.xxxxx..',
      '..xxx...',
    ];
    const shadow=[
      '........',
      '....xx..',
      '.....xx.',
      '......x.',
      '......x.',
      '.....xx.',
      '....xx..',
      '........',
    ];
    moonMap.forEach((row,dy)=>{
      for(let dx=0;dx<row.length;dx++){
        if(row[dx]==='x')px(mx+dx,my+dy,mc,moonAlpha);
      }
    });
    shadow.forEach((row,dy)=>{
      for(let dx=0;dx<row.length;dx++){
        if(row[dx]==='x'){
          // Sample bg color at this position
          const t=(my+dy)/gH;
          let c=pal[0].col;
          for(let i=0;i<pal.length-1;i++){
            if(t>=pal[i].pos&&t<=pal[i+1].pos){c=lerpColor(pal[i].col,pal[i+1].col,(t-pal[i].pos)/(pal[i+1].pos-pal[i].pos));break;}
          }
          px(mx+dx,my+dy,c,moonAlpha);
        }
      }
    });
    // Moon glow
    for(let dy=-3;dy<=10;dy++){
      for(let dx=-3;dx<=11;dx++){
        const dist=Math.sqrt((dx-4)**2+(dy-4)**2);
        if(dist>5&&dist<12){
          px(mx+dx,my+dy,'#aaaacc',moonAlpha*.04);
        }
      }
    }
  }

  // ── PIXEL CLOUDS ──
  if(phase==='day'||phase==='dawn'){
    const ca=phase==='day'?.7:.3;
    drawPixelCloud(Math.floor(gW*.1),Math.floor(gH*.06),ca);
    drawPixelCloud(Math.floor(gW*.45),Math.floor(gH*.04),ca*.8);
    drawPixelCloud(Math.floor(gW*.75),Math.floor(gH*.1),ca*.6);
  }

  // ── PIXEL SUN (sunset) ──
  if(phase==='sunset'){
    const sx=Math.floor(gW*.5)-4,sy=Math.floor(gH*.68);
    const sc='#f7d060';const sc2='#f0a040';
    // 8x4 pixel sun half-disc near horizon
    const sunMap=[
      '..xxxx..',
      '.xxxxxx.',
      'xxxxxxxx',
      'xxxxxxxx',
    ];
    sunMap.forEach((row,dy)=>{
      for(let dx=0;dx<row.length;dx++){
        if(row[dx]==='x')px(sx+dx,sy+dy,dy<2?sc:sc2,.85);
      }
    });
    // Sun rays (pixel lines)
    for(let i=-8;i<=8;i++){
      const a=.25-Math.abs(i)*.02;
      if(a>0)px(sx+4+i,sy-1,'#f7d060',a);
      if(a>0)px(sx+4+i,sy-2,'#f7d060',a*.5);
    }
  }

  requestAnimationFrame(drawPixelSky);
}

function drawPixelCloud(gx,gy,alpha){
  const c='#ffffff';
  //    ##
  //  ######
  // ########
  //  ######
  const cloudMap=[
    '..xx....',
    '.xxxxxx.',
    'xxxxxxxx',
    '.xxxxxx.',
  ];
  cloudMap.forEach((row,dy)=>{
    for(let dx=0;dx<row.length;dx++){
      if(row[dx]==='x')px(gx+dx,gy+dy,c,alpha);
    }
  });
}

window.addEventListener('resize',()=>{initSky();});
initSky();drawPixelSky();

/* ═══════════════════════════════════════
   DATA
   ═══════════════════════════════════════ */
const DURL='https://openrouter.ai/api/v1/chat/completions',DMODEL='anthropic/claude-sonnet-4';
let channels=JSON.parse(localStorage.getItem('c_ch')||'null')||[];
let activeId=localStorage.getItem('c_act')||'';
function mkCh(n,e){return{id:'c_'+Date.now()+'_'+Math.random().toString(36).slice(2,5),name:n||'新频道',emoji:e||'💬',url:'',key:'',model:DMODEL,system:'',ctx:40,messages:[]};}
if(!channels.length){channels.push(mkCh('Chat','💬'));activeId=channels[0].id;}
if(!channels.find(c=>c.id===activeId))activeId=channels[0].id;
function ga(){return channels.find(c=>c.id===activeId);}
function save(){localStorage.setItem('c_ch',JSON.stringify(channels));localStorage.setItem('c_act',activeId);}

const $=id=>document.getElementById(id);
const msgs=$('msgs'),ifield=$('ifield'),sbtn=$('sbtn'),typing=$('typing'),sidebar=$('sidebar'),sbBk=$('sbBk'),sov=$('sov'),welc=$('welc'),toastEl=$('toast'),ctxMenu=$('ctxMenu'),editBar=$('editBar'),editField=$('editField'),ibar=$('ibar');

/* Sidebar */
function openSb(){sidebar.classList.add('open');sbBk.classList.add('v');}
function closeSb(){sidebar.classList.remove('open');sbBk.classList.remove('v');}
$('openSb').onclick=openSb;$('closeSb').onclick=closeSb;sbBk.onclick=closeSb;
function renderSb(){
  const l=$('chList');l.innerHTML='';
  channels.forEach(ch=>{
    const d=document.createElement('div');d.className='ch-item'+(ch.id===activeId?' active':'');
    const p=ch.messages.length?ch.messages[ch.messages.length-1].parts[0].slice(0,28):'暂无消息';
    d.innerHTML=`<div class="ch-dot">${ch.emoji||'💬'}</div><div class="ch-info"><div class="ch-name">${ch.name||'未命名'}</div><div class="ch-preview">${p}</div></div>${channels.length>1?`<button class="ch-del" data-id="${ch.id}">✕</button>`:''}`;
    d.addEventListener('click',e=>{if(e.target.closest('.ch-del'))return;switchCh(ch.id);});
    l.appendChild(d);
  });
  l.querySelectorAll('.ch-del').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();if(channels.length<=1)return;if(!confirm('删除频道？'))return;channels=channels.filter(c=>c.id!==b.dataset.id);if(activeId===b.dataset.id)activeId=channels[0].id;save();renderSb();renderChat();}));
}
$('addCh').onclick=()=>{const c=mkCh();channels.push(c);activeId=c.id;save();renderSb();renderChat();closeSb();setTimeout(openCfg,200);};
function switchCh(id){activeId=id;save();renderSb();renderChat();closeSb();exitEdit();}

/* Settings */
function openCfg(){const c=ga();if(!c)return;$('cName').value=c.name||'';$('cEmoji').value=c.emoji||'';$('cUrl').value=c.url||'';$('cKey').value=c.key||'';$('cModel').value=c.model||DMODEL;$('cSys').value=c.system||'';$('cCtx').value=c.ctx||40;$('cCtxVal').textContent=c.ctx||40;$('sLabel').textContent='⚙ '+(c.name||'频道');sov.classList.add('open');}
$('cfgBtn').onclick=openCfg;sov.addEventListener('click',e=>{if(e.target===sov)sov.classList.remove('open');});
$('cCtx').oninput=function(){$('cCtxVal').textContent=this.value;};
$('sSave').onclick=()=>{const c=ga();if(!c)return;c.name=$('cName').value.trim()||'未命名';c.emoji=$('cEmoji').value.trim()||'💬';c.url=$('cUrl').value.trim();c.key=$('cKey').value.trim();c.model=$('cModel').value.trim()||DMODEL;c.system=$('cSys').value;c.ctx=parseInt($('cCtx').value)||40;save();sov.classList.remove('open');renderSb();updateHdr();toast('✓ 已保存');};
$('clrBtn').onclick=()=>{if(!confirm('清空记录？'))return;const c=ga();if(c){c.messages=[];save();renderChat();}toast('已清空');};
$('expBtn').onclick=()=>{const c=ga();if(!c)return;const t=c.messages.map(m=>{const w=m.role==='user'?'我':(c.name||'AI');return m.parts.map(p=>`[${m.time}] ${w}: ${p}`).join('\n');}).join('\n\n');navigator.clipboard?navigator.clipboard.writeText(t).then(()=>toast('已复制')):fbCopy(t);};
function fbCopy(t){const a=document.createElement('textarea');a.value=t;document.body.appendChild(a);a.select();document.execCommand('copy');document.body.removeChild(a);toast('已复制');}

/* Header */
function updateHdr(){const c=ga();if(!c)return;$('hName').textContent=(c.emoji||'')+' '+(c.name||'Chat');const s=$('hStatus');if(c.key){s.textContent='在线';s.style.color='var(--green)';}else{s.textContent='';s.style.color='';}}

/* Chat */
function renderChat(){msgs.querySelectorAll('.bgroup,.think-wrap').forEach(e=>e.remove());const c=ga();if(!c||!c.messages.length){welc.style.display='';}else{welc.style.display='none';c.messages.forEach((m,i)=>{if(m.thinking)addThink(m.thinking,false);addBG(m.role,m.parts,m.time,false,i);});}updateHdr();scrollEnd();}
function addBG(role,parts,time,anim=true,idx=-1){welc.style.display='none';const g=document.createElement('div');g.className=`bgroup ${role==='user'?'sent':'recv'}`;if(!anim)g.style.animation='none';if(idx>=0)g.dataset.idx=idx;parts.forEach(t=>{const b=document.createElement('div');b.className='bbl';b.textContent=t;g.appendChild(b);});if(time){const te=document.createElement('div');te.className='mtime';te.textContent=time;g.appendChild(te);}msgs.insertBefore(g,typing);scrollEnd();return g;}
function addThink(text,anim=true){const w=document.createElement('div');w.className='think-wrap';if(!anim)w.style.animation='none';w.innerHTML=`<div class="think-toggle"><span class="arrow">▶</span> 思考过程</div><div class="think-body"><div class="think-text">${esc(text)}</div></div>`;w.querySelector('.think-toggle').onclick=function(){this.querySelector('.arrow').classList.toggle('open');w.querySelector('.think-body').classList.toggle('open');};msgs.insertBefore(w,typing);scrollEnd();}
function addErr(t){const g=document.createElement('div');g.className='bgroup recv';const b=document.createElement('div');b.className='bbl err';b.textContent=t;g.appendChild(b);msgs.insertBefore(g,typing);scrollEnd();}
function scrollEnd(){requestAnimationFrame(()=>msgs.scrollTop=msgs.scrollHeight);}
function timeNow(){const d=new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function showTyping(on){typing.classList.toggle('v',on);const s=$('hStatus');if(on){s.textContent='正在输入…';s.style.color='var(--tx2)';}else updateHdr();if(on)scrollEnd();}
function splitB(t){let p=t.split(/\n{2,}/).map(s=>s.trim()).filter(s=>s);if(p.length===1&&t.length>180)p=t.split(/\n/).map(s=>s.trim()).filter(s=>s);return p.length?p:[t.trim()];}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* API */
async function callAPI(ch){
  const n=ch.ctx||40;const apiMsgs=[];const sys=(ch.system||'').trim();
  if(sys)apiMsgs.push({role:'system',content:sys});
  ch.messages.slice(-n).forEach(m=>apiMsgs.push({role:m.role==='user'?'user':'assistant',content:m.parts.join('\n\n')}));
  const body={model:ch.model||DMODEL,messages:apiMsgs,max_tokens:4096};
  const headers={'Content-Type':'application/json','Authorization':'Bearer '+ch.key};
  const url=ch.url||DURL;if(url.includes('openrouter'))headers['HTTP-Referer']=location.href;
  const res=await fetch(url,{method:'POST',headers,body:JSON.stringify(body)});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e?.error?.message||`HTTP ${res.status}`);}
  const data=await res.json();const choice=data.choices?.[0];if(!choice)throw new Error('空回复');
  let thinking=null;if(choice.message?.reasoning_content)thinking=choice.message.reasoning_content;
  let content=choice.message?.content||'';
  const tm=content.match(/<think>([\s\S]*?)<\/think>/);if(tm){thinking=tm[1].trim();content=content.replace(/<think>[\s\S]*?<\/think>/,'').trim();}
  return{content,thinking};
}

/* Send */
let sending=false;
async function handleSend(){
  const text=ifield.value.trim();if(!text||sending)return;const ch=ga();if(!ch)return;
  if(!ch.key){toast('⚠️ 设置API Key');openCfg();return;}
  sending=true;const t=timeNow();
  ch.messages.push({role:'user',parts:[text],time:t});addBG('user',[text],t,true,ch.messages.length-1);
  ifield.value='';autoR(ifield);updateSbtn();showTyping(true);
  try{
    const{content,thinking}=await callAPI(ch);showTyping(false);
    const rt=timeNow();const parts=splitB(content);
    ch.messages.push({role:'assistant',parts,time:rt,thinking:thinking||null});
    if(thinking)addThink(thinking);
    const g=addBG('assistant',[],rt,true,ch.messages.length-1);
    const te=g.querySelector('.mtime');if(te)te.remove();
    for(let i=0;i<parts.length;i++){await delay(Math.min(80+parts[i].length*.5,300));const b=document.createElement('div');b.className='bbl';b.textContent=parts[i];b.style.animation='bIn 220ms ease both';g.appendChild(b);scrollEnd();}
    const nte=document.createElement('div');nte.className='mtime';nte.textContent=rt;g.appendChild(nte);
    save();renderSb();
  }catch(err){showTyping(false);let m='连接失败：'+err.message;if(err.message.includes('401'))m='🔑 Key无效';else if(err.message.includes('429'))m='⏳ 太频繁';else if(err.message.includes('fetch')||err.message.includes('Network'))m='🌐 网络错误';addErr(m);}
  sending=false;
}
function delay(ms){return new Promise(r=>setTimeout(r,ms));}

/* Context menu */
let ctxIdx=-1;
msgs.addEventListener('click',e=>{const bbl=e.target.closest('.bbl');if(!bbl||bbl.classList.contains('err'))return;const g=bbl.closest('.bgroup');if(!g||!g.dataset.idx)return;ctxIdx=parseInt(g.dataset.idx);const ch=ga();if(!ch||ctxIdx>=ch.messages.length)return;const msg=ch.messages[ctxIdx];const r=bbl.getBoundingClientRect();const ar=document.getElementById('app').getBoundingClientRect();ctxMenu.querySelector('[data-action="edit"]').style.display=msg.role==='user'?'':'none';ctxMenu.querySelector('[data-action="regen"]').style.display=msg.role==='assistant'?'':'none';ctxMenu.style.left=Math.min(Math.max(r.left-ar.left,8),ar.width-145)+'px';ctxMenu.style.top=Math.min(r.bottom-ar.top+4,ar.height-180)+'px';ctxMenu.classList.add('v');});
document.addEventListener('click',e=>{if(!e.target.closest('.ctx-menu')&&!e.target.closest('.bbl'))ctxMenu.classList.remove('v');});
ctxMenu.querySelectorAll('.ctx-item').forEach(item=>item.addEventListener('click',()=>{const a=item.dataset.action;const ch=ga();if(!ch){ctxMenu.classList.remove('v');return;}ctxMenu.classList.remove('v');if(a==='copy'){const m=ch.messages[ctxIdx];if(m){const t=m.parts.join('\n\n');navigator.clipboard?navigator.clipboard.writeText(t).then(()=>toast('已复制')):fbCopy(t);}}else if(a==='edit')startEdit(ctxIdx);else if(a==='regen')regenFrom(ctxIdx);else if(a==='delete'){ch.messages.splice(ctxIdx,1);save();renderChat();renderSb();}}));

/* Edit */
let editIdx=-1;
function startEdit(i){const c=ga();if(!c)return;const m=c.messages[i];if(!m||m.role!=='user')return;editIdx=i;editField.value=m.parts.join('\n\n');ibar.style.display='none';editBar.classList.add('v');editField.focus();autoR(editField);}
function exitEdit(){editIdx=-1;editBar.classList.remove('v');ibar.style.display='';editField.value='';}
$('editCancel').onclick=exitEdit;
$('editSend').onclick=async()=>{const t=editField.value.trim();if(!t)return;const c=ga();if(!c)return;c.messages.splice(editIdx);save();renderChat();exitEdit();ifield.value=t;handleSend();};

/* Regen */
async function regenFrom(i){const ch=ga();if(!ch||sending)return;if(ch.messages[i]?.role!=='assistant')return;ch.messages.splice(i);save();renderChat();if(!ch.key){toast('⚠️ 设置Key');return;}sending=true;showTyping(true);try{const{content,thinking}=await callAPI(ch);showTyping(false);const rt=timeNow();const parts=splitB(content);ch.messages.push({role:'assistant',parts,time:rt,thinking:thinking||null});if(thinking)addThink(thinking);const g=addBG('assistant',[],rt,true,ch.messages.length-1);const te=g.querySelector('.mtime');if(te)te.remove();for(let i=0;i<parts.length;i++){await delay(Math.min(80+parts[i].length*.5,300));const b=document.createElement('div');b.className='bbl';b.textContent=parts[i];b.style.animation='bIn 220ms ease both';g.appendChild(b);scrollEnd();}const nte=document.createElement('div');nte.className='mtime';nte.textContent=rt;g.appendChild(nte);save();renderSb();}catch(err){showTyping(false);addErr('重新生成失败：'+err.message);}sending=false;}

/* Input */
function autoR(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
function updateSbtn(){sbtn.classList.toggle('active',ifield.value.trim().length>0);}
ifield.addEventListener('input',()=>{autoR(ifield);updateSbtn();});
ifield.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend();}});
editField.addEventListener('input',()=>autoR(editField));
sbtn.onclick=handleSend;

let tt=null;function toast(m){toastEl.textContent=m;toastEl.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>toastEl.classList.remove('show'),1800);}

renderSb();renderChat();if(window.innerWidth>500)ifield.focus();
</script>
