<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════ THEME VARIABLES ═══════════ */
:root{
  --bg0:#000;--bg1:#0a0a0c;--bg2:#1c1c1e;--bg3:#2c2c2e;--bg4:#3a3a3c;
  --glass:rgba(28,28,30,.85);
  --tx1:#fff;--tx2:rgba(235,235,245,.6);--tx3:rgba(235,235,245,.3);
  --accent:#bf5af2;--accent-d:rgba(191,90,242,.15);
  --green:#30d158;--red:#ff453a;--pink:#ff375f;--blue:#0a84ff;--orange:#ff9f0a;
  --sent:#bf5af2;--recv:#2c2c2e;
  --user-sent:#2c7cf6;
  --rb:20px;--rc:14px;
  --sidebar-w:272px;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
  --tr:250ms cubic-bezier(.4,0,.2,1);
}
[data-theme="light"]{
  --bg0:#f2f2f7;--bg1:#fff;--bg2:#f2f2f7;--bg3:#e5e5ea;--bg4:#d1d1d6;
  --glass:rgba(255,255,255,.85);
  --tx1:#000;--tx2:rgba(60,60,67,.6);--tx3:rgba(60,60,67,.3);
  --recv:#e9e9eb;
  --sent:#bf5af2;--user-sent:#2c7cf6;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg0);
  font-family:'Noto Sans SC',-apple-system,'PingFang SC',sans-serif;
  color:var(--tx1);display:flex;justify-content:center;align-items:center;
  -webkit-font-smoothing:antialiased;transition:background .3s;
}

/* ═══════════ SHELL ═══════════ */
#app{width:100%;max-width:500px;height:100vh;height:100dvh;background:var(–bg1);display:flex;position:relative;overflow:hidden;transition:background .3s;}
@media(min-width:540px){#app{height:min(932px,100vh);border-radius:32px;box-shadow:0 0 0 2px rgba(128,128,128,.2),0 30px 80px rgba(0,0,0,.4);}}

/* ═══════════ SIDEBAR ═══════════ */
.sidebar{position:absolute;top:0;bottom:0;left:0;width:var(–sidebar-w);background:var(–bg2);z-index:80;transform:translateX(-100%);transition:transform 320ms cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column;border-right:1px solid rgba(128,128,128,.1);}
.sidebar.open{transform:translateX(0);}
.sb-hdr{padding:14px;padding-top:max(14px,var(–safe-t));display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(128,128,128,.08);}
.sb-title{font-size:17px;font-weight:700;}
.sb-list{flex:1;overflow-y:auto;padding:6px;-webkit-overflow-scrolling:touch;}
.sb-list::-webkit-scrollbar{display:none;}
.ch-item{padding:11px;border-radius:11px;cursor:pointer;margin-bottom:3px;transition:background var(–tr);display:flex;align-items:center;gap:10px;position:relative;}
.ch-item:active{background:rgba(128,128,128,.06);}
.ch-item.active{background:var(–accent-d);}
.ch-dot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.ch-info{flex:1;min-width:0;}
.ch-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ch-preview{font-size:11px;color:var(–tx3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.ch-del{position:absolute;right:6px;top:50%;transform:translateY(-50%);width:26px;height:26px;border-radius:50%;background:transparent;border:none;color:var(–tx3);font-size:13px;cursor:pointer;display:none;align-items:center;justify-content:center;}
.ch-item:hover .ch-del,.ch-item:active .ch-del{display:flex;}
.sb-add{margin:6px;padding:11px;border-radius:11px;background:var(–bg3);border:1px dashed rgba(128,128,128,.15);color:var(–tx2);font-size:13px;font-family:inherit;cursor:pointer;text-align:center;}
.sb-add:active{background:var(–bg4);}
.sb-bk{position:absolute;inset:0;z-index:79;background:rgba(0,0,0,.35);opacity:0;pointer-events:none;transition:opacity 300ms;}
.sb-bk.v{opacity:1;pointer-events:auto;}

/* ═══════════ MAIN ═══════════ */
.main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative;}
.hdr{flex-shrink:0;padding:9px 10px;padding-top:max(9px,var(–safe-t));background:var(–glass);-webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid rgba(128,128,128,.08);z-index:10;display:flex;align-items:center;gap:8px;}
.hbtn{width:34px;height:34px;border-radius:50%;background:var(–bg3);border:none;color:var(–tx2);font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background var(–tr);}
.hbtn:active{background:var(–bg4);}
.hinfo{flex:1;min-width:0;}
.hname{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hstatus{font-size:11px;margin-top:1px;}

/* ═══════════ MESSAGES ═══════════ */
.msgs{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px;display:flex;flex-direction:column;gap:3px;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;}
.msgs::-webkit-scrollbar{display:none;}

.bgroup{display:flex;flex-direction:column;gap:3px;max-width:84%;animation:bIn 240ms ease both;}
.bgroup.sent{align-self:flex-end;align-items:flex-end;}
.bgroup.recv{align-self:flex-start;align-items:flex-start;}
@keyframes bIn{from{opacity:0;transform:translateY(8px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}

.bbl{padding:9px 14px;font-size:15px;line-height:1.55;word-break:break-word;white-space:pre-wrap;cursor:pointer;-webkit-user-select:text;user-select:text;transition:filter .15s;}
.bbl:active{filter:brightness(.85);}

/* Sent (user) */
.bgroup.sent .bbl{background:var(–user-sent);color:#fff;border-radius:var(–rb);}
.bgroup.sent .bbl:only-child{border-radius:var(–rb) var(–rb) 6px var(–rb);}
.bgroup.sent .bbl:first-child:not(:only-child){border-radius:var(–rb) var(–rb) 6px var(–rb);}
.bgroup.sent .bbl:last-child:not(:only-child){border-radius:var(–rb) 6px 6px var(–rb);}
.bgroup.sent .bbl:not(:first-child):not(:last-child){border-radius:var(–rb) 6px 6px var(–rb);}
/* Recv (AI) */
.bgroup.recv .bbl{background:var(–recv);color:var(–tx1);border-radius:var(–rb);}
.bgroup.recv .bbl:only-child{border-radius:var(–rb) var(–rb) var(–rb) 6px;}
.bgroup.recv .bbl:first-child:not(:only-child){border-radius:var(–rb) var(–rb) var(–rb) 6px;}
.bgroup.recv .bbl:last-child:not(:only-child){border-radius:6px var(–rb) var(–rb) 6px;}
.bgroup.recv .bbl:not(:first-child):not(:last-child){border-radius:6px var(–rb) var(–rb) 6px;}

.mtime{font-size:10px;color:var(–tx3);margin-top:2px;padding:0 4px;}
.bbl.err{background:rgba(255,69,58,.1)!important;color:var(–red)!important;border:1px solid rgba(255,69,58,.12);font-size:13px;}

/* Thinking block */
.think-wrap{max-width:84%;align-self:flex-start;margin-bottom:2px;animation:bIn 240ms ease both;}
.think-toggle{font-size:12px;color:var(–tx3);cursor:pointer;padding:4px 8px;display:flex;align-items:center;gap:4px;border-radius:8px;transition:background var(–tr);}
.think-toggle:hover{background:rgba(128,128,128,.08);}
.think-toggle .arrow{transition:transform .2s;display:inline-block;}
.think-toggle .arrow.open{transform:rotate(90deg);}
.think-body{max-height:0;overflow:hidden;transition:max-height .35s ease;padding:0 8px;}
.think-body.open{max-height:2000px;}
.think-text{font-size:13px;color:var(–tx3);line-height:1.55;white-space:pre-wrap;padding:6px 0;border-left:2px solid rgba(128,128,128,.15);padding-left:10px;}

/* Typing */
.typing{display:none;align-self:flex-start;padding:11px 16px;background:var(–recv);border-radius:var(–rb) var(–rb) var(–rb) 6px;}
.typing.v{display:flex;gap:5px;align-items:center;}
.tdot{width:7px;height:7px;border-radius:50%;background:var(–tx3);animation:tb 1.4s infinite ease-in-out;}
.tdot:nth-child(2){animation-delay:.2s;}.tdot:nth-child(3){animation-delay:.4s;}
@keyframes tb{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-5px);opacity:1;}}

/* Welcome */
.welc{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 24px;text-align:center;margin:auto 0;}
.welc-e{font-size:44px;margin-bottom:12px;}
.welc-t{font-size:19px;font-weight:700;margin-bottom:6px;background:linear-gradient(135deg,var(–accent),var(–pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.welc-d{font-size:13px;color:var(–tx2);line-height:1.7;max-width:250px;}

/* ═══════════ CONTEXT MENU ═══════════ */
.ctx-menu{position:fixed;z-index:200;background:var(–bg3);border-radius:12px;padding:4px;box-shadow:0 8px 30px rgba(0,0,0,.35);opacity:0;pointer-events:none;transform:scale(.92);transition:all .15s ease;min-width:120px;-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);}
.ctx-menu.v{opacity:1;pointer-events:auto;transform:scale(1);}
.ctx-item{padding:10px 14px;font-size:14px;cursor:pointer;border-radius:8px;display:flex;align-items:center;gap:8px;color:var(–tx1);transition:background .12s;}
.ctx-item:active{background:rgba(128,128,128,.12);}
.ctx-item.danger{color:var(–red);}

/* ═══════════ INPUT ═══════════ */
.ibar{flex-shrink:0;padding:7px 10px;padding-bottom:max(7px,var(–safe-b));background:var(–glass);-webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);border-top:1px solid rgba(128,128,128,.08);display:flex;align-items:flex-end;gap:7px;}
.ifield{flex:1;background:var(–bg2);border:1px solid rgba(128,128,128,.1);border-radius:22px;padding:9px 15px;color:var(–tx1);font-size:15px;font-family:inherit;line-height:1.4;resize:none;outline:none;max-height:120px;min-height:40px;overflow-y:auto;transition:border-color var(–tr);}
.ifield:focus{border-color:rgba(191,90,242,.4);}
.ifield::placeholder{color:var(–tx3);}
.sbtn{width:40px;height:40px;border-radius:50%;background:var(–accent);border:none;color:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all var(–tr);opacity:.3;transform:scale(.86);}
.sbtn.active{opacity:1;transform:scale(1);}
.sbtn:active{transform:scale(.84);}

/* ═══════════ SETTINGS PANEL ═══════════ */
.sov{position:absolute;inset:0;background:rgba(0,0,0,.45);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 280ms;}
.sov.open{opacity:1;pointer-events:auto;}
.ssheet{width:100%;max-width:500px;background:var(–bg2);border-radius:18px 18px 0 0;padding:13px 16px;padding-bottom:max(13px,calc(var(–safe-b) + 8px));transform:translateY(100%);transition:transform 340ms cubic-bezier(.32,.72,0,1);max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.ssheet::-webkit-scrollbar{display:none;}
.sov.open .ssheet{transform:translateY(0);}
.shandle{width:34px;height:4px;background:var(–bg4);border-radius:2px;margin:0 auto 12px;}
.stitle{font-size:16px;font-weight:600;margin-bottom:12px;text-align:center;}
.sg{margin-bottom:10px;}
.sl{font-size:12px;color:var(–tx2);margin-bottom:3px;display:block;}
.si{width:100%;background:var(–bg3);border:1px solid rgba(128,128,128,.08);border-radius:10px;padding:9px 12px;color:var(–tx1);font-size:13px;font-family:‘SF Mono’,‘Menlo’,‘Courier New’,monospace;outline:none;transition:border-color var(–tr);}
.si:focus{border-color:var(–accent);}
.si::placeholder{color:var(–tx3);}
.sta{width:100%;background:var(–bg3);border:1px solid rgba(128,128,128,.08);border-radius:10px;padding:9px 12px;color:var(–tx1);font-size:13px;font-family:inherit;line-height:1.5;outline:none;resize:vertical;min-height:60px;max-height:170px;transition:border-color var(–tr);}
.sta:focus{border-color:var(–accent);}
.sta::placeholder{color:var(–tx3);}
.snote{font-size:10px;color:var(–tx3);margin-top:2px;line-height:1.4;}
.ssave{width:100%;padding:12px;border-radius:12px;border:none;background:var(–accent);color:#fff;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:12px;}
.ssave:active{opacity:.7;}
.srow{display:flex;gap:6px;margin-top:7px;}
.srow button{flex:1;padding:10px;border-radius:10px;font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;}
.bo-d{background:transparent;border:1px solid rgba(255,69,58,.2);color:var(–red);}
.bo-d:active{background:rgba(255,69,58,.08);}
.bo-s{background:transparent;border:1px solid rgba(128,128,128,.15);color:var(–tx2);}
.bo-s:active{background:rgba(128,128,128,.05);}

/* Range slider */
.range-wrap{display:flex;align-items:center;gap:10px;}
.range-wrap input[type=range]{flex:1;-webkit-appearance:none;height:4px;background:var(–bg4);border-radius:2px;outline:none;}
.range-wrap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.3);cursor:pointer;}
.range-val{font-size:14px;font-weight:600;min-width:28px;text-align:center;}

/* Theme toggle */
.theme-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;}
.theme-label{font-size:13px;color:var(–tx2);}
.tgl{width:48px;height:28px;background:var(–bg4);border-radius:14px;position:relative;cursor:pointer;transition:background var(–tr);flex-shrink:0;}
.tgl.on{background:var(–green);}
.tgl::after{content:’’;position:absolute;top:2px;left:2px;width:24px;height:24px;background:#fff;border-radius:50%;transition:transform var(–tr);box-shadow:0 1px 3px rgba(0,0,0,.2);}
.tgl.on::after{transform:translateX(20px);}

/* Toast */
.toast{position:absolute;top:56px;left:50%;z-index:200;transform:translateX(-50%) translateY(-12px);background:var(–bg4);padding:8px 16px;border-radius:10px;font-size:13px;opacity:0;pointer-events:none;transition:all 280ms;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Edit mode */
.edit-bar{display:none;flex-shrink:0;padding:7px 10px;padding-bottom:max(7px,var(–safe-b));background:var(–glass);-webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);border-top:1px solid rgba(128,128,128,.08);align-items:flex-end;gap:7px;}
.edit-bar.v{display:flex;}
.edit-bar .ifield{flex:1;}
.edit-bar .cancel-btn{padding:9px 14px;border-radius:20px;background:var(–bg3);border:none;color:var(–tx2);font-size:14px;font-family:inherit;cursor:pointer;flex-shrink:0;}
</style>

</head>
<body>
<div id="app">
  <!-- Sidebar backdrop -->
  <div class="sb-bk" id="sbBk"></div>
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sb-hdr">
      <div class="sb-title">💬 频道</div>
      <button class="hbtn" id="closeSb" style="font-size:13px;">✕</button>
    </div>
    <div class="sb-list" id="chList"></div>
    <button class="sb-add" id="addCh">+ 新建频道</button>
  </div>
  <!-- Main -->
  <div class="main">
    <div class="hdr">
      <button class="hbtn" id="openSb">☰</button>
      <div class="hinfo"><div class="hname" id="hName">Chat</div><div class="hstatus" id="hStatus"></div></div>
      <button class="hbtn" id="cfgBtn">⚙️</button>
    </div>
    <div class="msgs" id="msgs">
      <div class="welc" id="welc"><div class="welc-e">💬</div><div class="welc-t">AI Chat</div><div class="welc-d">☰ 管理频道 &nbsp;·&nbsp; ⚙️ 配置频道<br>每个频道独立设置与记录</div></div>
      <div class="typing" id="typing"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div>
    </div>
    <!-- Normal input -->
    <div class="ibar" id="ibar">
      <textarea class="ifield" id="ifield" rows="1" placeholder="说点什么…"></textarea>
      <button class="sbtn" id="sbtn">↑</button>
    </div>
    <!-- Edit input -->
    <div class="edit-bar" id="editBar">
      <textarea class="ifield" id="editField" rows="1" placeholder="编辑消息…"></textarea>
      <button class="cancel-btn" id="editCancel">取消</button>
      <button class="sbtn active" id="editSend">↑</button>
    </div>
  </div>
  <!-- Settings -->
  <div class="sov" id="sov">
    <div class="ssheet">
      <div class="shandle"></div>
      <div class="stitle" id="sLabel">⚙️ 频道设置</div>
      <div class="sg"><label class="sl">频道名称</label><input class="si" id="cName" style="font-family:inherit" placeholder="起个名字"></div>
      <div class="sg"><label class="sl">频道图标 (emoji)</label><input class="si" id="cEmoji" style="font-family:inherit;font-size:17px" placeholder="💬" maxlength="4"></div>
      <div class="sg"><label class="sl">API 地址</label><input class="si" id="cUrl" placeholder="https://openrouter.ai/api/v1/chat/completions"><div class="snote">OpenAI兼容格式 · 支持OpenRouter/中转站/任意兼容端点<br>必须以 /v1/chat/completions 结尾</div></div>
      <div class="sg"><label class="sl">API Key</label><input class="si" id="cKey" type="password" placeholder="sk-or-xxxxx / sk-xxxxx"><div class="snote">仅存浏览器本地</div></div>
      <div class="sg"><label class="sl">模型</label><input class="si" id="cModel" placeholder="anthropic/claude-sonnet-4"><div class="snote">OpenRouter格式：provider/model · 中转站看文档</div></div>
      <div class="sg"><label class="sl">系统指令 (System Prompt)</label><textarea class="sta" id="cSys" rows="3" placeholder="定义AI的角色、性格、规则…&#10;留空则不发送"></textarea></div>
      <div class="sg">
        <label class="sl">上下文条数</label>
        <div class="range-wrap"><input type="range" id="cCtx" min="2" max="80" value="40"><span class="range-val" id="cCtxVal">40</span></div>
        <div class="snote">每次发送携带最近N条对话（越多=上下文越长=花费越多）</div>
      </div>
      <div class="sg">
        <div class="theme-row">
          <span class="theme-label">☀️ 浅色模式</span>
          <div class="tgl" id="themeTgl"></div>
        </div>
      </div>
      <button class="ssave" id="sSave">保存</button>
      <div class="srow">
        <button class="bo-s" id="expBtn">📋 导出</button>
        <button class="bo-d" id="clrBtn">🗑️ 清空记录</button>
      </div>
    </div>
  </div>
  <!-- Context Menu -->
  <div class="ctx-menu" id="ctxMenu">
    <div class="ctx-item" data-action="copy">📋 复制</div>
    <div class="ctx-item" data-action="edit">✏️ 编辑</div>
    <div class="ctx-item" data-action="regen">🔄 重新生成</div>
    <div class="ctx-item danger" data-action="delete">🗑️ 删除</div>
  </div>
  <div class="toast" id="toast"></div>
</div>

<script>
/* ═══════════ DATA ═══════════ */
const DURL='https://openrouter.ai/api/v1/chat/completions';
const DMODEL='anthropic/claude-sonnet-4';
let channels=JSON.parse(localStorage.getItem('c_ch')||'null')||[];
let activeId=localStorage.getItem('c_act')||'';
let theme=localStorage.getItem('c_theme')||'dark';

function mkCh(n,e){return{id:'c_'+Date.now()+'_'+Math.random().toString(36).slice(2,5),name:n||'新频道',emoji:e||'💬',url:'',key:'',model:DMODEL,system:'',ctx:40,messages:[]};}
if(!channels.length){const c=mkCh('Chat','💬');channels.push(c);activeId=c.id;}
if(!channels.find(c=>c.id===activeId))activeId=channels[0].id;
function ga(){return channels.find(c=>c.id===activeId);}
function save(){localStorage.setItem('c_ch',JSON.stringify(channels));localStorage.setItem('c_act',activeId);}
function applyTheme(){document.documentElement.setAttribute('data-theme',theme);localStorage.setItem('c_theme',theme);}
applyTheme();

/* ═══════════ DOM ═══════════ */
const $=id=>document.getElementById(id);
const msgs=$('msgs'),ifield=$('ifield'),sbtn=$('sbtn'),typing=$('typing'),
  sidebar=$('sidebar'),sbBk=$('sbBk'),sov=$('sov'),welc=$('welc'),
  toastEl=$('toast'),ctxMenu=$('ctxMenu'),editBar=$('editBar'),
  editField=$('editField'),ibar=$('ibar');

/* ═══════════ SIDEBAR ═══════════ */
function openSb(){sidebar.classList.add('open');sbBk.classList.add('v');}
function closeSb(){sidebar.classList.remove('open');sbBk.classList.remove('v');}
$('openSb').onclick=openSb;$('closeSb').onclick=closeSb;sbBk.onclick=closeSb;

function renderSb(){
  const l=$('chList');l.innerHTML='';
  channels.forEach(ch=>{
    const d=document.createElement('div');
    d.className='ch-item'+(ch.id===activeId?' active':'');
    const p=ch.messages.length?ch.messages[ch.messages.length-1].parts[0].slice(0,28):'暂无消息';
    d.innerHTML=`<div class="ch-dot" style="background:${ch.id===activeId?'var(--accent-d)':'var(--bg3)'}">${ch.emoji||'💬'}</div><div class="ch-info"><div class="ch-name">${ch.name||'未命名'}</div><div class="ch-preview">${p}</div></div>${channels.length>1?`<button class="ch-del" data-id="${ch.id}">✕</button>`:''}`;
    d.addEventListener('click',e=>{if(e.target.closest('.ch-del'))return;switchCh(ch.id);});
    l.appendChild(d);
  });
  l.querySelectorAll('.ch-del').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();const id=b.dataset.id;
    if(channels.length<=1)return;if(!confirm('删除频道及所有记录？'))return;
    channels=channels.filter(c=>c.id!==id);if(activeId===id)activeId=channels[0].id;
    save();renderSb();renderChat();
  }));
}

$('addCh').onclick=()=>{const c=mkCh();channels.push(c);activeId=c.id;save();renderSb();renderChat();closeSb();setTimeout(openCfg,200);};
function switchCh(id){activeId=id;save();renderSb();renderChat();closeSb();exitEdit();}

/* ═══════════ SETTINGS ═══════════ */
function openCfg(){
  const c=ga();if(!c)return;
  $('cName').value=c.name||'';$('cEmoji').value=c.emoji||'';
  $('cUrl').value=c.url||'';$('cKey').value=c.key||'';
  $('cModel').value=c.model||DMODEL;$('cSys').value=c.system||'';
  $('cCtx').value=c.ctx||40;$('cCtxVal').textContent=c.ctx||40;
  $('sLabel').textContent='⚙️ '+(c.name||'频道')+' 设置';
  const tgl=$('themeTgl');tgl.classList.toggle('on',theme==='light');
  sov.classList.add('open');
}
$('cfgBtn').onclick=openCfg;
sov.addEventListener('click',e=>{if(e.target===sov)sov.classList.remove('open');});
$('cCtx').oninput=function(){$('cCtxVal').textContent=this.value;};

$('themeTgl').onclick=function(){
  theme=theme==='dark'?'light':'dark';
  this.classList.toggle('on',theme==='light');applyTheme();
};

$('sSave').onclick=()=>{
  const c=ga();if(!c)return;
  c.name=$('cName').value.trim()||'未命名';c.emoji=$('cEmoji').value.trim()||'💬';
  c.url=$('cUrl').value.trim();c.key=$('cKey').value.trim();
  c.model=$('cModel').value.trim()||DMODEL;c.system=$('cSys').value;
  c.ctx=parseInt($('cCtx').value)||40;
  save();sov.classList.remove('open');renderSb();updateHdr();toast('✓ 已保存');
};
$('clrBtn').onclick=()=>{if(!confirm('清空当前频道记录？'))return;const c=ga();if(c){c.messages=[];save();renderChat();}toast('已清空');};
$('expBtn').onclick=()=>{
  const c=ga();if(!c)return;
  const t=c.messages.map(m=>{const w=m.role==='user'?'我':(c.name||'AI');return m.parts.map(p=>`[${m.time}] ${w}: ${p}`).join('\n');}).join('\n\n');
  navigator.clipboard?navigator.clipboard.writeText(t).then(()=>toast('已复制')):fallbackCopy(t);
};
function fallbackCopy(t){const a=document.createElement('textarea');a.value=t;document.body.appendChild(a);a.select();document.execCommand('copy');document.body.removeChild(a);toast('已复制');}

/* ═══════════ HEADER ═══════════ */
function updateHdr(){
  const c=ga();if(!c)return;
  $('hName').textContent=(c.emoji||'')+' '+(c.name||'Chat');
  const s=$('hStatus');
  if(c.key){s.textContent='在线';s.style.color='var(--green)';}
  else{s.textContent='未配置';s.style.color='var(--tx3)';}
}

/* ═══════════ CHAT RENDER ═══════════ */
function renderChat(){
  msgs.querySelectorAll('.bgroup,.think-wrap').forEach(e=>e.remove());
  const c=ga();
  if(!c||!c.messages.length){welc.style.display='';} 
  else{welc.style.display='none';c.messages.forEach((m,i)=>{
    if(m.thinking)addThinkBlock(m.thinking,false);
    addBGroup(m.role,m.parts,m.time,false,i);
  });}
  updateHdr();scrollEnd();
}

function addBGroup(role,parts,time,anim=true,msgIdx=-1){
  welc.style.display='none';
  const g=document.createElement('div');
  g.className=`bgroup ${role==='user'?'sent':'recv'}`;
  if(!anim)g.style.animation='none';
  if(msgIdx>=0)g.dataset.idx=msgIdx;
  parts.forEach(t=>{const b=document.createElement('div');b.className='bbl';b.textContent=t;g.appendChild(b);});
  if(time){const te=document.createElement('div');te.className='mtime';te.textContent=time;g.appendChild(te);}
  msgs.insertBefore(g,typing);scrollEnd();return g;
}

function addThinkBlock(text,anim=true){
  const w=document.createElement('div');
  w.className='think-wrap';if(!anim)w.style.animation='none';
  w.innerHTML=`<div class="think-toggle"><span class="arrow">▶</span> 思考过程</div><div class="think-body"><div class="think-text">${escHtml(text)}</div></div>`;
  w.querySelector('.think-toggle').onclick=function(){
    const a=this.querySelector('.arrow'),b=w.querySelector('.think-body');
    a.classList.toggle('open');b.classList.toggle('open');
  };
  msgs.insertBefore(w,typing);scrollEnd();
}

function addErr(t){
  const g=document.createElement('div');g.className='bgroup recv';
  const b=document.createElement('div');b.className='bbl err';b.textContent=t;
  g.appendChild(b);msgs.insertBefore(g,typing);scrollEnd();
}

function scrollEnd(){requestAnimationFrame(()=>msgs.scrollTop=msgs.scrollHeight);}
function timeNow(){const d=new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function showTyping(on){typing.classList.toggle('v',on);const s=$('hStatus');if(on){s.textContent='正在输入…';s.style.color='var(--tx2)';}else updateHdr();if(on)scrollEnd();}

function splitBubbles(t){
  let p=t.split(/\n{2,}/).map(s=>s.trim()).filter(s=>s);
  if(p.length===1&&t.length>180)p=t.split(/\n/).map(s=>s.trim()).filter(s=>s);
  return p.length?p:[t.trim()];
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ═══════════ API (OpenAI Format) ═══════════ */
async function callAPI(ch){
  const n=ch.ctx||40;
  const apiMsgs=[];
  const sys=(ch.system||'').trim();
  if(sys)apiMsgs.push({role:'system',content:sys});
  ch.messages.slice(-n).forEach(m=>apiMsgs.push({role:m.role==='user'?'user':'assistant',content:m.parts.join('\n\n')}));

  const body={model:ch.model||DMODEL,messages:apiMsgs,max_tokens:4096};
  const headers={'Content-Type':'application/json','Authorization':'Bearer '+ch.key};
  // OpenRouter specific
  const url=ch.url||DURL;
  if(url.includes('openrouter'))headers['HTTP-Referer']=location.href;

  const res=await fetch(url,{method:'POST',headers,body:JSON.stringify(body)});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e?.error?.message||`HTTP ${res.status}`);}
  const data=await res.json();
  
  // Extract thinking if present
  let thinking=null;
  const choice=data.choices?.[0];
  if(!choice)throw new Error('空回复');

  // Some providers put thinking in reasoning_content or in <think> tags
  if(choice.message?.reasoning_content)thinking=choice.message.reasoning_content;
  let content=choice.message?.content||'';
  
  // Check for <think> tags in content
  const thinkMatch=content.match(/<think>([\s\S]*?)<\/think>/);
  if(thinkMatch){
    thinking=thinkMatch[1].trim();
    content=content.replace(/<think>[\s\S]*?<\/think>/,'').trim();
  }
  
  return{content,thinking};
}

/* ═══════════ SEND ═══════════ */
let sending=false;
async function handleSend(){
  const text=ifield.value.trim();if(!text||sending)return;
  const ch=ga();if(!ch)return;
  if(!ch.key){toast('⚠️ 先设置API Key');openCfg();return;}
  sending=true;
  const t=timeNow();
  ch.messages.push({role:'user',parts:[text],time:t});
  addBGroup('user',[text],t,true,ch.messages.length-1);
  ifield.value='';autoResize(ifield);updateSbtn();
  showTyping(true);
  try{
    const{content,thinking}=await callAPI(ch);
    showTyping(false);
    const rt=timeNow();const parts=splitBubbles(content);
    ch.messages.push({role:'assistant',parts,time:rt,thinking:thinking||null});
    if(thinking)addThinkBlock(thinking);
    // Staggered bubbles
    const g=addBGroup('assistant',[],rt,true,ch.messages.length-1);
    const te=g.querySelector('.mtime');if(te)te.remove();
    for(let i=0;i<parts.length;i++){
      await delay(Math.min(80+parts[i].length*.5,300));
      const b=document.createElement('div');b.className='bbl';b.textContent=parts[i];
      b.style.animation='bIn 220ms ease both';g.appendChild(b);scrollEnd();
    }
    const nte=document.createElement('div');nte.className='mtime';nte.textContent=rt;g.appendChild(nte);
    save();renderSb();
  }catch(err){
    showTyping(false);
    let m='连接失败：'+err.message;
    if(err.message.includes('401')||err.message.includes('auth'))m='🔑 API Key 无效';
    else if(err.message.includes('429'))m='⏳ 太频繁，稍等';
    else if(err.message.includes('fetch')||err.message.includes('Network'))m='🌐 网络错误 — 检查API地址';
    addErr(m);
  }
  sending=false;
}

function delay(ms){return new Promise(r=>setTimeout(r,ms));}

/* ═══════════ CONTEXT MENU ═══════════ */
let ctxMsgIdx=-1;
msgs.addEventListener('click',e=>{
  const bbl=e.target.closest('.bbl');
  if(!bbl||bbl.classList.contains('err'))return;
  const group=bbl.closest('.bgroup');
  if(!group||!group.dataset.idx)return;
  ctxMsgIdx=parseInt(group.dataset.idx);
  const ch=ga();if(!ch||ctxMsgIdx>=ch.messages.length)return;
  const msg=ch.messages[ctxMsgIdx];
  
  // Position menu
  const r=bbl.getBoundingClientRect();
  const appR=document.getElementById('app').getBoundingClientRect();
  let x=r.left-appR.left;
  let y=r.bottom-appR.top+4;
  
  // Show/hide relevant items
  ctxMenu.querySelector('[data-action="edit"]').style.display=msg.role==='user'?'':'none';
  ctxMenu.querySelector('[data-action="regen"]').style.display=msg.role==='assistant'?'':'none';
  
  // Clamp position
  ctxMenu.style.left=Math.min(Math.max(x,8),appR.width-140)+'px';
  ctxMenu.style.top=Math.min(y,appR.height-180)+'px';
  ctxMenu.classList.add('v');
});

document.addEventListener('click',e=>{if(!e.target.closest('.ctx-menu')&&!e.target.closest('.bbl'))hideCtx();});
function hideCtx(){ctxMenu.classList.remove('v');}

ctxMenu.querySelectorAll('.ctx-item').forEach(item=>{
  item.addEventListener('click',()=>{
    const action=item.dataset.action;
    const ch=ga();if(!ch)return;
    hideCtx();
    if(action==='copy'){
      const m=ch.messages[ctxMsgIdx];if(!m)return;
      const t=m.parts.join('\n\n');
      navigator.clipboard?navigator.clipboard.writeText(t).then(()=>toast('已复制')):fallbackCopy(t);
    }
    else if(action==='edit'){startEdit(ctxMsgIdx);}
    else if(action==='regen'){regenFrom(ctxMsgIdx);}
    else if(action==='delete'){
      ch.messages.splice(ctxMsgIdx,1);save();renderChat();renderSb();
    }
  });
});

/* ═══════════ EDIT ═══════════ */
let editIdx=-1;
function startEdit(idx){
  const ch=ga();if(!ch)return;
  const m=ch.messages[idx];if(!m||m.role!=='user')return;
  editIdx=idx;
  editField.value=m.parts.join('\n\n');
  ibar.style.display='none';editBar.classList.add('v');
  editField.focus();autoResize(editField);
}
function exitEdit(){editIdx=-1;editBar.classList.remove('v');ibar.style.display='';editField.value='';}
$('editCancel').onclick=exitEdit;
$('editSend').onclick=async()=>{
  const text=editField.value.trim();if(!text)return;
  const ch=ga();if(!ch)return;
  // Remove this message and everything after it
  ch.messages.splice(editIdx);
  save();renderChat();exitEdit();
  // Send as new message
  ifield.value=text;handleSend();
};

/* ═══════════ REGEN ═══════════ */
async function regenFrom(idx){
  const ch=ga();if(!ch||sending)return;
  if(ch.messages[idx]?.role!=='assistant')return;
  // Remove this assistant message and everything after
  ch.messages.splice(idx);save();renderChat();
  // Re-send
  if(!ch.key){toast('⚠️ 先设置API Key');return;}
  sending=true;showTyping(true);
  try{
    const{content,thinking}=await callAPI(ch);
    showTyping(false);
    const rt=timeNow();const parts=splitBubbles(content);
    ch.messages.push({role:'assistant',parts,time:rt,thinking:thinking||null});
    if(thinking)addThinkBlock(thinking);
    const g=addBGroup('assistant',[],rt,true,ch.messages.length-1);
    const te=g.querySelector('.mtime');if(te)te.remove();
    for(let i=0;i<parts.length;i++){
      await delay(Math.min(80+parts[i].length*.5,300));
      const b=document.createElement('div');b.className='bbl';b.textContent=parts[i];
      b.style.animation='bIn 220ms ease both';g.appendChild(b);scrollEnd();
    }
    const nte=document.createElement('div');nte.className='mtime';nte.textContent=rt;g.appendChild(nte);
    save();renderSb();
  }catch(err){showTyping(false);addErr('重新生成失败：'+err.message);}
  sending=false;
}

/* ═══════════ INPUT ═══════════ */
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
function updateSbtn(){sbtn.classList.toggle('active',ifield.value.trim().length>0);}
ifield.addEventListener('input',()=>{autoResize(ifield);updateSbtn();});
ifield.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend();}});
editField.addEventListener('input',()=>autoResize(editField));
sbtn.onclick=handleSend;

/* ═══════════ TOAST ═══════════ */
let tt=null;
function toast(m){toastEl.textContent=m;toastEl.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>toastEl.classList.remove('show'),1800);}

/* ═══════════ INIT ═══════════ */
renderSb();renderChat();
if(window.innerWidth>500)ifield.focus();
</script>
