<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   VARIABLES & RESET
   ═══════════════════════════════════════ */
:root {
  --bg-black:#000; --bg-primary:#0a0a0c; --bg-secondary:#1c1c1e;
  --bg-tertiary:#2c2c2e; --bg-elevated:#3a3a3c;
  --bg-glass:rgba(28,28,30,0.85);
  --text-primary:#fff; --text-secondary:rgba(235,235,245,0.6);
  --text-tertiary:rgba(235,235,245,0.3);
  --accent:#bf5af2; --accent-dim:rgba(191,90,242,0.15);
  --green:#30d158; --red:#ff453a; --pink:#ff375f; --blue:#0a84ff; --orange:#ff9f0a;
  --sent-bg:#bf5af2; --recv-bg:#2c2c2e;
  --radius-bubble:20px; --radius-card:14px;
  --sidebar-w:280px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --transition:250ms cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg-black);
  font-family:'Noto Sans SC',-apple-system,'PingFang SC',sans-serif;
  color:var(--text-primary);
  display:flex;justify-content:center;align-items:center;
  -webkit-font-smoothing:antialiased;
}

/* ═══════════════════════════════════════
APP SHELL
═══════════════════════════════════════ */
#app{
width:100%;max-width:500px;
height:100vh;height:100dvh;
background:var(–bg-primary);
display:flex;position:relative;overflow:hidden;
}
@media(min-width:540px){
#app{
height:min(932px,100vh);
border-radius:32px;
box-shadow:0 0 0 2px #222,0 30px 80px rgba(0,0,0,.5);
}
}

/* ═══════════════════════════════════════
SIDEBAR
═══════════════════════════════════════ */
.sidebar{
position:absolute;top:0;bottom:0;left:0;
width:var(–sidebar-w);
background:var(–bg-secondary);
z-index:80;
transform:translateX(-100%);
transition:transform 320ms cubic-bezier(.32,.72,0,1);
display:flex;flex-direction:column;
border-right:1px solid rgba(255,255,255,.06);
}
.sidebar.open{transform:translateX(0);}

.sidebar-header{
padding:16px;padding-top:max(16px,var(–safe-top));
display:flex;justify-content:space-between;align-items:center;
border-bottom:1px solid rgba(255,255,255,.06);
}
.sidebar-title{font-size:18px;font-weight:700;}

.sidebar-list{
flex:1;overflow-y:auto;padding:8px;
-webkit-overflow-scrolling:touch;
}
.sidebar-list::-webkit-scrollbar{display:none;}

.channel-item{
padding:12px;border-radius:12px;cursor:pointer;
margin-bottom:4px;transition:background var(–transition);
display:flex;align-items:center;gap:10px;
position:relative;
}
.channel-item:active{background:rgba(255,255,255,.04);}
.channel-item.active{background:var(–accent-dim);}
.channel-dot{
width:36px;height:36px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
font-size:16px;flex-shrink:0;
}
.channel-info{flex:1;min-width:0;}
.channel-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.channel-preview{font-size:12px;color:var(–text-tertiary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.channel-delete{
position:absolute;right:8px;top:50%;transform:translateY(-50%);
width:28px;height:28px;border-radius:50%;
background:transparent;border:none;color:var(–text-tertiary);
font-size:14px;cursor:pointer;display:none;
align-items:center;justify-content:center;
}
.channel-item:hover .channel-delete,.channel-item:active .channel-delete{display:flex;}

.sidebar-add{
margin:8px;padding:12px;border-radius:12px;
background:var(–bg-tertiary);border:1px dashed rgba(255,255,255,.1);
color:var(–text-secondary);font-size:14px;font-family:inherit;
cursor:pointer;text-align:center;transition:background var(–transition);
}
.sidebar-add:active{background:var(–bg-elevated);}

/* Sidebar overlay on mobile */
.sidebar-backdrop{
position:absolute;inset:0;z-index:79;
background:rgba(0,0,0,.4);opacity:0;pointer-events:none;
transition:opacity 300ms;
}
.sidebar-backdrop.visible{opacity:1;pointer-events:auto;}

/* ═══════════════════════════════════════
MAIN CHAT AREA
═══════════════════════════════════════ */
.chat-main{
flex:1;display:flex;flex-direction:column;
min-width:0;position:relative;
}

/* Header */
.chat-header{
flex-shrink:0;
padding:10px 12px;
padding-top:max(10px,var(–safe-top));
background:var(–bg-glass);
-webkit-backdrop-filter:saturate(180%) blur(20px);
backdrop-filter:saturate(180%) blur(20px);
border-bottom:1px solid rgba(255,255,255,.06);
z-index:10;display:flex;align-items:center;gap:10px;
}
.menu-btn{
width:36px;height:36px;border-radius:50%;
background:var(–bg-tertiary);border:none;color:var(–text-secondary);
font-size:18px;cursor:pointer;flex-shrink:0;
display:flex;align-items:center;justify-content:center;
transition:background var(–transition);
}
.menu-btn:active{background:var(–bg-elevated);}
.header-info{flex:1;min-width:0;}
.header-name{font-size:16px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.header-status{font-size:11px;margin-top:1px;}
.cfg-btn{
width:36px;height:36px;border-radius:50%;
background:var(–bg-tertiary);border:none;color:var(–text-secondary);
font-size:15px;cursor:pointer;flex-shrink:0;
display:flex;align-items:center;justify-content:center;
}

/* Messages */
.messages-area{
flex:1;overflow-y:auto;overflow-x:hidden;
padding:14px;display:flex;flex-direction:column;gap:3px;
-webkit-overflow-scrolling:touch;scroll-behavior:smooth;
}
.messages-area::-webkit-scrollbar{display:none;}

/* Bubble groups */
.bubble-group{
display:flex;flex-direction:column;gap:3px;
max-width:84%;animation:bubbleIn 250ms ease both;
}
.bubble-group.sent{align-self:flex-end;align-items:flex-end;}
.bubble-group.received{align-self:flex-start;align-items:flex-start;}
@keyframes bubbleIn{
from{opacity:0;transform:translateY(8px) scale(.97);}
to{opacity:1;transform:translateY(0) scale(1);}
}
.bubble{
padding:10px 15px;font-size:15.5px;line-height:1.55;
word-break:break-word;white-space:pre-wrap;
}
/* Sent bubbles */
.bubble-group.sent .bubble{background:var(–sent-bg);color:#fff;border-radius:var(–radius-bubble);}
.bubble-group.sent .bubble:only-child{border-radius:var(–radius-bubble) var(–radius-bubble) 6px var(–radius-bubble);}
.bubble-group.sent .bubble:first-child:not(:only-child){border-radius:var(–radius-bubble) var(–radius-bubble) 6px var(–radius-bubble);}
.bubble-group.sent .bubble:last-child:not(:only-child){border-radius:var(–radius-bubble) 6px 6px var(–radius-bubble);}
.bubble-group.sent .bubble:not(:first-child):not(:last-child){border-radius:var(–radius-bubble) 6px 6px var(–radius-bubble);}
/* Received bubbles */
.bubble-group.received .bubble{background:var(–recv-bg);color:var(–text-primary);border-radius:var(–radius-bubble);}
.bubble-group.received .bubble:only-child{border-radius:var(–radius-bubble) var(–radius-bubble) var(–radius-bubble) 6px;}
.bubble-group.received .bubble:first-child:not(:only-child){border-radius:var(–radius-bubble) var(–radius-bubble) var(–radius-bubble) 6px;}
.bubble-group.received .bubble:last-child:not(:only-child){border-radius:6px var(–radius-bubble) var(–radius-bubble) 6px;}
.bubble-group.received .bubble:not(:first-child):not(:last-child){border-radius:6px var(–radius-bubble) var(–radius-bubble) 6px;}

.msg-time{font-size:11px;color:var(–text-tertiary);margin-top:2px;padding:0 4px;}
.bubble.error{
background:rgba(255,69,58,.12)!important;color:var(–red)!important;
border:1px solid rgba(255,69,58,.15);font-size:14px;
}

/* Typing */
.typing-indicator{
display:none;align-self:flex-start;
padding:12px 18px;background:var(–recv-bg);
border-radius:var(–radius-bubble) var(–radius-bubble) var(–radius-bubble) 6px;
}
.typing-indicator.visible{display:flex;gap:5px;align-items:center;}
.typing-dot{
width:7px;height:7px;border-radius:50%;background:var(–text-tertiary);
animation:typBounce 1.4s infinite ease-in-out;
}
.typing-dot:nth-child(2){animation-delay:.2s;}
.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes typBounce{
0%,60%,100%{transform:translateY(0);opacity:.4;}
30%{transform:translateY(-5px);opacity:1;}
}

/* Welcome */
.welcome{
display:flex;flex-direction:column;align-items:center;justify-content:center;
padding:40px 24px;text-align:center;margin:auto 0;
}
.welcome-emoji{font-size:48px;margin-bottom:14px;}
.welcome-title{
font-size:20px;font-weight:700;margin-bottom:6px;
background:linear-gradient(135deg,var(–accent),var(–pink));
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.welcome-desc{font-size:14px;color:var(–text-secondary);line-height:1.7;max-width:260px;}

/* Input bar */
.input-bar{
flex-shrink:0;padding:8px 10px;
padding-bottom:max(8px,var(–safe-bottom));
background:var(–bg-glass);
-webkit-backdrop-filter:saturate(180%) blur(20px);
backdrop-filter:saturate(180%) blur(20px);
border-top:1px solid rgba(255,255,255,.06);
display:flex;align-items:flex-end;gap:8px;
}
.input-field{
flex:1;background:var(–bg-secondary);
border:1px solid rgba(255,255,255,.08);
border-radius:22px;padding:10px 16px;
color:var(–text-primary);font-size:16px;font-family:inherit;
line-height:1.4;resize:none;outline:none;
max-height:120px;min-height:42px;overflow-y:auto;
transition:border-color var(–transition);
}
.input-field:focus{border-color:rgba(191,90,242,.4);}
.input-field::placeholder{color:var(–text-tertiary);}
.send-btn{
width:42px;height:42px;border-radius:50%;
background:var(–accent);border:none;color:#fff;font-size:18px;
cursor:pointer;display:flex;align-items:center;justify-content:center;
flex-shrink:0;transition:all var(–transition);
opacity:.35;transform:scale(.88);
}
.send-btn.active{opacity:1;transform:scale(1);}
.send-btn:active{transform:scale(.85);}

/* ═══════════════════════════════════════
SETTINGS PANEL
═══════════════════════════════════════ */
.settings-overlay{
position:absolute;inset:0;background:rgba(0,0,0,.5);
-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
z-index:100;display:flex;align-items:flex-end;justify-content:center;
opacity:0;pointer-events:none;transition:opacity 280ms;
}
.settings-overlay.open{opacity:1;pointer-events:auto;}
.settings-sheet{
width:100%;max-width:500px;background:var(–bg-secondary);
border-radius:20px 20px 0 0;padding:14px 18px;
padding-bottom:max(14px,calc(var(–safe-bottom) + 10px));
transform:translateY(100%);
transition:transform 340ms cubic-bezier(.32,.72,0,1);
max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.settings-sheet::-webkit-scrollbar{display:none;}
.settings-overlay.open .settings-sheet{transform:translateY(0);}
.settings-handle{width:36px;height:5px;background:var(–bg-elevated);border-radius:3px;margin:0 auto 14px;}
.settings-title{font-size:17px;font-weight:600;margin-bottom:14px;text-align:center;}
.s-group{margin-bottom:12px;}
.s-label{font-size:12px;color:var(–text-secondary);margin-bottom:4px;display:block;}
.s-input{
width:100%;background:var(–bg-tertiary);
border:1px solid rgba(255,255,255,.06);border-radius:10px;
padding:10px 12px;color:var(–text-primary);font-size:13px;
font-family:‘SF Mono’,‘Menlo’,‘Courier New’,monospace;
outline:none;transition:border-color var(–transition);
}
.s-input:focus{border-color:var(–accent);}
.s-input::placeholder{color:var(–text-tertiary);}
.s-textarea{
width:100%;background:var(–bg-tertiary);
border:1px solid rgba(255,255,255,.06);border-radius:10px;
padding:10px 12px;color:var(–text-primary);font-size:13px;
font-family:inherit;line-height:1.5;outline:none;resize:vertical;
min-height:70px;max-height:180px;
transition:border-color var(–transition);
}
.s-textarea:focus{border-color:var(–accent);}
.s-textarea::placeholder{color:var(–text-tertiary);}
.s-note{font-size:11px;color:var(–text-tertiary);margin-top:3px;line-height:1.4;}
.s-save{
width:100%;padding:13px;border-radius:14px;border:none;
background:var(–accent);color:#fff;font-size:16px;font-weight:600;
font-family:inherit;cursor:pointer;margin-top:14px;
}
.s-save:active{opacity:.7;}
.s-row{display:flex;gap:8px;margin-top:8px;}
.s-row button{
flex:1;padding:11px;border-radius:10px;font-size:13px;
font-weight:500;font-family:inherit;cursor:pointer;
}
.btn-od{background:transparent;border:1px solid rgba(255,69,58,.25);color:var(–red);}
.btn-od:active{background:rgba(255,69,58,.1);}
.btn-os{background:transparent;border:1px solid rgba(255,255,255,.1);color:var(–text-secondary);}
.btn-os:active{background:rgba(255,255,255,.05);}

/* Toast */
.toast{
position:absolute;top:60px;left:50%;z-index:200;
transform:translateX(-50%) translateY(-14px);
background:var(–bg-elevated);padding:9px 18px;border-radius:10px;
font-size:13px;opacity:0;pointer-events:none;transition:all 280ms;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>

</head>

<script>
/* ═══════════════════════════════════════
   DATA LAYER
   ═══════════════════════════════════════ */
const DEFAULT_URL = 'https://api.anthropic.com/v1/messages';
const DEFAULT_MODEL = 'claude-sonnet-4-20250514';

/*
  channels = [
    {
      id: 'xxx',
      name: 'Serein',
      emoji: '🐺',
      url: '...',
      key: '...',
      model: '...',
      system: '...',
      messages: [ { role:'user'|'assistant', parts:['...'], time:'HH:MM' } ]
    }
  ]
*/
let channels = JSON.parse(localStorage.getItem('chat_channels') || 'null') || [];
let activeId = localStorage.getItem('chat_active') || '';

// Ensure at least one channel
if (channels.length === 0) {
  const ch = makeChannel('Chat', '💬');
  channels.push(ch);
  activeId = ch.id;
  saveAll();
}
if (!channels.find(c => c.id === activeId)) {
  activeId = channels[0].id;
  saveAll();
}

function makeChannel(name, emoji) {
  return {
    id: 'ch_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
    name: name || '新频道',
    emoji: emoji || '💬',
    url: '', key: '', model: DEFAULT_MODEL, system: '',
    messages: []
  };
}
function getActive() { return channels.find(c => c.id === activeId); }
function saveAll() {
  localStorage.setItem('chat_channels', JSON.stringify(channels));
  localStorage.setItem('chat_active', activeId);
}

/* ═══════════════════════════════════════
   DOM REFS
   ═══════════════════════════════════════ */
const $ = id => document.getElementById(id);
const messagesArea = $('messagesArea');
const inputField = $('inputField');
const sendBtn = $('sendBtn');
const typingIndicator = $('typingIndicator');
const sidebar = $('sidebar');
const sidebarBackdrop = $('sidebarBackdrop');
const settingsOverlay = $('settingsOverlay');
const welcomeScreen = $('welcomeScreen');
const toastEl = $('toast');

/* ═══════════════════════════════════════
   SIDEBAR
   ═══════════════════════════════════════ */
function openSidebar() {
  sidebar.classList.add('open');
  sidebarBackdrop.classList.add('visible');
}
function closeSidebar() {
  sidebar.classList.remove('open');
  sidebarBackdrop.classList.remove('visible');
}
$('openSidebar').onclick = openSidebar;
$('closeSidebar').onclick = closeSidebar;
sidebarBackdrop.onclick = closeSidebar;

function renderSidebar() {
  const list = $('channelList');
  list.innerHTML = '';
  channels.forEach(ch => {
    const el = document.createElement('div');
    el.className = 'channel-item' + (ch.id === activeId ? ' active' : '');
    const lastMsg = ch.messages.length > 0
      ? ch.messages[ch.messages.length - 1].parts[0].slice(0, 30)
      : '暂无消息';
    el.innerHTML = `
      <div class="channel-dot" style="background:${ch.id===activeId?'var(--accent-dim)':'var(--bg-tertiary)'};">
        ${ch.emoji || '💬'}
      </div>
      <div class="channel-info">
        <div class="channel-name">${ch.name || '未命名'}</div>
        <div class="channel-preview">${lastMsg}</div>
      </div>
      ${channels.length > 1 ? `<button class="channel-delete" data-id="${ch.id}">✕</button>` : ''}
    `;
    el.addEventListener('click', (e) => {
      if (e.target.closest('.channel-delete')) return;
      switchChannel(ch.id);
    });
    list.appendChild(el);
  });
  // Delete handlers
  list.querySelectorAll('.channel-delete').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = btn.dataset.id;
      if (channels.length <= 1) return;
      if (!confirm('删除这个频道和所有聊天记录？')) return;
      channels = channels.filter(c => c.id !== id);
      if (activeId === id) activeId = channels[0].id;
      saveAll();
      renderSidebar();
      renderChat();
    });
  });
}

$('addChannelBtn').onclick = () => {
  const ch = makeChannel('新频道', '💬');
  channels.push(ch);
  activeId = ch.id;
  saveAll();
  renderSidebar();
  renderChat();
  closeSidebar();
  // Open settings for new channel
  setTimeout(() => openSettings(), 200);
};

function switchChannel(id) {
  activeId = id;
  saveAll();
  renderSidebar();
  renderChat();
  closeSidebar();
}

/* ═══════════════════════════════════════
   SETTINGS
   ═══════════════════════════════════════ */
function openSettings() {
  const ch = getActive();
  if (!ch) return;
  $('cfgName').value = ch.name || '';
  $('cfgEmoji').value = ch.emoji || '';
  $('cfgUrl').value = ch.url || '';
  $('cfgKey').value = ch.key || '';
  $('cfgModel').value = ch.model || DEFAULT_MODEL;
  $('cfgSystem').value = ch.system || '';
  $('settingsLabel').textContent = '⚙️ ' + (ch.name || '频道') + ' 设置';
  settingsOverlay.classList.add('open');
}
$('cfgBtn').onclick = openSettings;
settingsOverlay.addEventListener('click', e => {
  if (e.target === settingsOverlay) settingsOverlay.classList.remove('open');
});

$('settingsSave').onclick = () => {
  const ch = getActive();
  if (!ch) return;
  ch.name = $('cfgName').value.trim() || '未命名';
  ch.emoji = $('cfgEmoji').value.trim() || '💬';
  ch.url = $('cfgUrl').value.trim();
  ch.key = $('cfgKey').value.trim();
  ch.model = $('cfgModel').value.trim() || DEFAULT_MODEL;
  ch.system = $('cfgSystem').value;
  saveAll();
  settingsOverlay.classList.remove('open');
  renderSidebar();
  updateHeader();
  showToast('✓ 已保存');
};

$('clearMsgBtn').onclick = () => {
  if (!confirm('清空当前频道的聊天记录？')) return;
  const ch = getActive();
  if (ch) { ch.messages = []; saveAll(); renderChat(); }
  showToast('已清空');
};

$('exportBtn').onclick = () => {
  const ch = getActive();
  if (!ch) return;
  const text = ch.messages.map(m => {
    const who = m.role === 'user' ? '我' : (ch.name || 'AI');
    return m.parts.map(p => `[${m.time}] ${who}: ${p}`).join('\n');
  }).join('\n\n');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast('已复制'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('已复制');
  }
};

/* ═══════════════════════════════════════
   CHAT RENDERING
   ═══════════════════════════════════════ */
function updateHeader() {
  const ch = getActive();
  if (!ch) return;
  $('headerName').textContent = (ch.emoji || '') + ' ' + (ch.name || 'Chat');
  const st = $('headerStatus');
  if (ch.key) { st.textContent = '在线'; st.style.color = 'var(--green)'; }
  else { st.textContent = '点 ⚙️ 设置API'; st.style.color = 'var(--text-tertiary)'; }
}

function renderChat() {
  // Clear bubbles
  messagesArea.querySelectorAll('.bubble-group').forEach(el => el.remove());
  const ch = getActive();
  if (!ch || ch.messages.length === 0) {
    welcomeScreen.style.display = '';
  } else {
    welcomeScreen.style.display = 'none';
    ch.messages.forEach(m => addBubbleGroup(m.role, m.parts, m.time, false));
  }
  updateHeader();
  scrollBottom();
}

function addBubbleGroup(role, parts, time, animate = true) {
  welcomeScreen.style.display = 'none';
  const group = document.createElement('div');
  group.className = `bubble-group ${role === 'user' ? 'sent' : 'received'}`;
  if (!animate) group.style.animation = 'none';
  parts.forEach(t => {
    const b = document.createElement('div');
    b.className = 'bubble'; b.textContent = t;
    group.appendChild(b);
  });
  if (time) {
    const te = document.createElement('div');
    te.className = 'msg-time'; te.textContent = time;
    group.appendChild(te);
  }
  messagesArea.insertBefore(group, typingIndicator);
  scrollBottom();
  return group;
}

function addErrorBubble(text) {
  const g = document.createElement('div');
  g.className = 'bubble-group received';
  const b = document.createElement('div');
  b.className = 'bubble error'; b.textContent = text;
  g.appendChild(b);
  messagesArea.insertBefore(g, typingIndicator);
  scrollBottom();
}

function scrollBottom() {
  requestAnimationFrame(() => messagesArea.scrollTop = messagesArea.scrollHeight);
}

function timeNow() {
  const d = new Date();
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

function showTyping(on) {
  typingIndicator.classList.toggle('visible', on);
  const st = $('headerStatus');
  if (on) { st.textContent = '正在输入…'; st.style.color = 'var(--text-secondary)'; }
  else updateHeader();
  if (on) scrollBottom();
}

function splitBubbles(text) {
  let parts = text.split(/\n{2,}/).map(p => p.trim()).filter(p => p);
  if (parts.length === 1 && text.length > 180) {
    parts = text.split(/\n/).map(p => p.trim()).filter(p => p);
  }
  return parts.length ? parts : [text.trim()];
}

/* ═══════════════════════════════════════
   API CALL
   ═══════════════════════════════════════ */
async function callAPI(ch) {
  const msgs = ch.messages.slice(-40).map(m => ({
    role: m.role === 'user' ? 'user' : 'assistant',
    content: m.parts.join('\n\n'),
  }));
  const body = { model: ch.model || DEFAULT_MODEL, max_tokens: 4096, messages: msgs };
  const sys = (ch.system || '').trim();
  if (sys) body.system = sys;

  const headers = {
    'Content-Type': 'application/json',
    'x-api-key': ch.key,
    'anthropic-version': '2023-06-01',
    'anthropic-dangerous-direct-browser-access': 'true',
  };
  const url = ch.url || DEFAULT_URL;
  const res = await fetch(url, { method:'POST', headers, body:JSON.stringify(body) });
  if (!res.ok) {
    const e = await res.json().catch(() => ({}));
    throw new Error(e?.error?.message || `HTTP ${res.status}`);
  }
  const data = await res.json();
  return (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n') || '';
}

/* ═══════════════════════════════════════
   SEND
   ═══════════════════════════════════════ */
let sending = false;
async function handleSend() {
  const text = inputField.value.trim();
  if (!text || sending) return;
  const ch = getActive();
  if (!ch) return;
  if (!ch.key) { showToast('⚠️ 先设置 API Key'); openSettings(); return; }

  sending = true;
  const t = timeNow();
  ch.messages.push({ role:'user', parts:[text], time:t });
  addBubbleGroup('user', [text], t);
  inputField.value = ''; autoResize(); updateSendBtn();
  showTyping(true);

  try {
    const reply = await callAPI(ch);
    showTyping(false);
    const rt = timeNow();
    const parts = splitBubbles(reply);
    ch.messages.push({ role:'assistant', parts, time:rt });

    // Staggered animation
    const group = addBubbleGroup('assistant', [], rt);
    const timeEl = group.querySelector('.msg-time');
    if (timeEl) timeEl.remove();
    for (let i = 0; i < parts.length; i++) {
      await delay(Math.min(100 + parts[i].length * 0.6, 350));
      const b = document.createElement('div');
      b.className = 'bubble'; b.textContent = parts[i];
      b.style.animation = 'bubbleIn 220ms ease both';
      group.appendChild(b);
      scrollBottom();
    }
    const te = document.createElement('div');
    te.className = 'msg-time'; te.textContent = rt;
    group.appendChild(te);

    saveAll();
    renderSidebar(); // update preview
  } catch (err) {
    showTyping(false);
    let msg = '连接失败：' + err.message;
    if (err.message.includes('401') || err.message.includes('auth')) msg = '🔑 API Key 无效';
    else if (err.message.includes('429')) msg = '⏳ 太频繁，稍等再试';
    else if (err.message.includes('fetch') || err.message.includes('Network'))
      msg = '🌐 网络错误 — 检查API地址是否支持CORS';
    addErrorBubble(msg);
  }
  sending = false;
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

/* ═══════════════════════════════════════
   INPUT
   ═══════════════════════════════════════ */
function autoResize() {
  inputField.style.height = 'auto';
  inputField.style.height = Math.min(inputField.scrollHeight, 120) + 'px';
}
function updateSendBtn() {
  sendBtn.classList.toggle('active', inputField.value.trim().length > 0);
}
inputField.addEventListener('input', () => { autoResize(); updateSendBtn(); });
inputField.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
});
sendBtn.onclick = handleSend;

/* ═══════════════════════════════════════
   TOAST
   ═══════════════════════════════════════ */
let toastT = null;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => toastEl.classList.remove('show'), 2000);
}

/* ═══════════════════════════════════════
   INIT
   ═══════════════════════════════════════ */
renderSidebar();
renderChat();
if (window.innerWidth > 500) inputField.focus();
</script>
